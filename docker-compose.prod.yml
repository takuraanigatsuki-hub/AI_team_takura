# Production: docker compose -f docker-compose.prod.yml up -d --build
services:
  ai-team-room:
    build: .
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./knowledge:/app/knowledge
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      ai-team-room:
        condition: service_healthy
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - web

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiteam}
      POSTGRES_DB: ${POSTGRES_DB:-aiteam}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web

networks:
  web:

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
