<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Team Room — Портал</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="description" content="Личный кабинет, админ-панель и поддержка AI Team Room">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css?v=54">
    <link rel="stylesheet" href="/static/css/enhancements.css?v=20">
    <link rel="stylesheet" href="/static/css/snow-theme.css?v=3">
    <link rel="stylesheet" href="/static/css/ui-core.css?v=9">
    <link rel="stylesheet" href="/static/css/premium-theme.css?v=3">
    <link rel="stylesheet" href="/static/css/shell-nav.css?v=1">
    <link rel="stylesheet" href="/static/css/support.css?v=3">
</head>
<body class="portal-shell">
<a href="#mainContent" class="skip-link">К содержимому</a>
<div id="ariaLiveStatus" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div class="app-content-wrap portal-content-wrap">
<header class="header header-unified">
    <div class="header-row header-row-main">
        <button type="button" class="hdr-btn hdr-icon sb-mobile-toggle" id="mobileNavToggle" aria-label="Меню" aria-expanded="false" title="Навигация">☰</button>
        <a href="/" class="logo logo-link" title="Главный сайт">
            <div class="logo-mark">🤖</div>
            <div class="logo-text"><h1>AI Team Room</h1><p class="logo-tag">портал</p></div>
        </a>
        <nav class="portal-topnav" id="portalTopNav" aria-label="Разделы портала"></nav>
        <div class="header-actions header-actions-compact">
            <span class="hdr-balance hidden" id="headerBalanceChip" title="Баланс"></span>
            <button type="button" class="hdr-btn hdr-icon fp-hide-mobile" id="themeToggle" onclick="toggleTheme()" title="Тема">☀️</button>
            <details class="header-dropdown header-dropdown-account">
                <summary class="hdr-btn hdr-icon hdr-account" id="userMenuSummary" title="Аккаунт">👤</summary>
                <div class="dropdown-menu" id="userMenu">
                    <a href="/" class="dropdown-item">На сайт</a>
                    <a href="/?auth=login" class="dropdown-item">Вход</a>
                </div>
            </details>
        </div>
    </div>
</header>

<div class="main" id="mainContent">
    <div id="adminView" class="admin-layout hidden">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-head">
                <h2>🛡 Панель управления</h2>
                <p class="muted">Пользователи · баланс · Cursor · AI</p>
            </div>
            <nav class="admin-nav" id="adminNav"></nav>
        </aside>
        <main class="admin-main">
            <div id="adminPanelContent" class="admin-content">
                <div class="ui-loading-inline ui-ph" aria-busy="true" role="status"><span class="ui-loading-ring sm" aria-hidden="true"></span><span class="muted">Загрузка…</span></div>
            </div>
        </main>
    </div>

    <div id="supportView" class="support-layout hidden">
        <div id="supportPanelRoot" style="display:flex;flex:1;min-height:0;width:100%"></div>
    </div>

    <div id="profileView" class="profile-layout hidden">
        <main class="profile-main profile-main-unified">
            <header class="profile-topbar">
                <div class="profile-topbar-head">
                    <h2>👤 Личный кабинет</h2>
                    <p class="muted">Обзор · профиль · подписка · настройки</p>
                </div>
                <nav class="profile-tab-nav profile-tab-nav-horizontal" id="profileTabNav" aria-label="Разделы кабинета"></nav>
            </header>
            <div id="profileTabContent" class="profile-tab-content">
                <div class="ui-loading-inline ui-ph" aria-busy="true" role="status"><span class="ui-loading-ring sm" aria-hidden="true"></span><span class="muted">Загрузка…</span></div>
            </div>
        </main>
    </div>
</div>
</div>

<nav class="mobile-tab-bar" id="mobileTabBar" aria-label="Быстрая навигация">
    <button type="button" class="mtab active" data-view="profile"><span class="mtab-icon">👤</span>Кабинет</button>
    <button type="button" class="mtab hidden" data-view="admin" id="portalMobileAdmin"><span class="mtab-icon">🛡</span>Admin</button>
    <button type="button" class="mtab hidden" data-view="support" id="portalMobileSupport"><span class="mtab-icon">💬</span>Тикеты</button>
    <a href="/download?reason=desktop-only" class="mtab mtab-link mtab-dl"><span class="mtab-icon">⬇</span>Скачать</a>
</nav>

<div class="portal-mobile-drawer hidden" id="portalMobileDrawer" aria-hidden="true">
    <div class="portal-drawer-backdrop" id="portalDrawerBackdrop"></div>
    <div class="portal-drawer-panel" id="portalDrawerPanel"></div>
</div>

<script>window.APP_SHELL = 'portal';</script>
<script src="/static/js/app-shell.js?v=1"></script>
<script src="/static/js/themes-auto.js?v=2"></script>
<script src="/static/js/ui-enhancements.js?v=8"></script>
<script src="/static/js/support-tickets.js?v=2"></script>
<script src="/static/js/support-panel.js?v=2"></script>
<script src="/static/js/ui-access.js?v=4"></script>
<script src="/static/js/auth.js?v=16"></script>
<script src="/static/js/auth-fields.js?v=1"></script>
<script src="/static/js/profile.js?v=14"></script>
<script src="/static/js/admin-panel.js?v=6"></script>
<script src="/static/js/security-dashboard.js?v=3"></script>
<script src="/static/js/ui-core.js?v=14"></script>
<script src="/static/js/sidebar-nav.js?v=12"></script>
<script src="/static/js/app.js?v=67"></script>
</body>
</html>
