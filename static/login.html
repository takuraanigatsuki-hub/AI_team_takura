<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Team Room</title>
    <meta name="description" content="Войдите в AI Team Room — сохраните настройки, проекты и доступ к личному кабинету.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/landing.css?v=2">
    <link rel="icon" href="/static/icons/icon-192.png">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--lp-surface);
            border: 1px solid var(--lp-border);
            border-radius: 16px;
            padding: 32px;
        }
        .login-card h1 { margin-bottom: 4px; font-size: 24px; }
        .login-sub { color: var(--lp-muted); font-size: 14px; margin-bottom: 24px; }
        .login-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--lp-muted);
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        .login-back:hover { color: var(--lp-text); }
        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--lp-muted);
        }
        .password-wrap {
            position: relative;
        }
        .password-wrap .lp-input {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--lp-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            line-height: 1;
        }
        .password-toggle:hover { color: var(--lp-text); }
        .login-card .lp-btn-full { margin-top: 8px; }
    </style>
</head>
<body>
<div class="login-page">
    <a href="/" class="login-back">← На главную</a>
    <div class="login-card">
        <h1>Вход</h1>
        <p class="login-sub">Войдите, чтобы сохранить настройки и проекты</p>
        <form id="loginForm" novalidate>
            <label class="lp-label" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="lp-input" required autocomplete="email" placeholder="you@company.com">

            <label class="lp-label" for="loginPassword">Пароль</label>
            <div class="password-wrap">
                <input type="password" id="loginPassword" class="lp-input" required minlength="6" autocomplete="current-password" placeholder="минимум 6 символов">
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Показать пароль">👁</button>
            </div>

            <p class="lp-error hidden" id="loginError" role="alert"></p>
            <button type="submit" class="lp-btn-xl lp-btn-full" id="loginSubmit">Войти</button>
        </form>
        <p class="login-footer">
            Нет аккаунта?
            <a href="/?auth=register" class="lp-link" style="text-decoration:underline">Зарегистрироваться</a>
        </p>
    </div>
</div>
<script src="/static/js/login.js?v=1"></script>
</body>
</html>
