server {
    listen 80;
    server_name trade.example.com;  # замените на свой домен

    # certbot создаст TLS-конфиг при `certbot --nginx -d trade.example.com`

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # запрет на огромные тела (если кто-то решит спамить POST'ами)
    client_max_body_size 1m;

    access_log /var/log/nginx/trade.access.log;
    error_log  /var/log/nginx/trade.error.log warn;
}
