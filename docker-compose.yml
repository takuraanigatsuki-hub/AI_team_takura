services:
  ai-team-room:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./knowledge:/app/knowledge
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://aiteam:aiteam@postgres:5432/aiteam
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiteam
      POSTGRES_PASSWORD: aiteam
      POSTGRES_DB: aiteam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
